<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verification</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;padding:30px;box-shadow:0 4px 8px rgba(0,0,0,0.05);">
          <tr>
            <td style="text-align:center;">
              <h1 style="color:#333333;font-size:24px;margin:0 0 20px 0;">Email Verification</h1>
            </td>
          </tr>
          <tr>
            <td>
              <p style="color:#555555;font-size:16px;line-height:1.5;margin:0 0 20px 0;">
                Hello {{name}},
              </p>
              <p style="color:#555555;font-size:16px;line-height:1.5;margin:0 0 20px 0;">
                Thank you for signing up! Please verify your email address using the code below:
              </p>
              <p style="text-align:center;font-size:24px;font-weight:bold;color:#4CAF50;margin:30px 0;">
                {{verificationCode}}
              </p>
              <p style="color:#555555;font-size:16px;line-height:1.5;margin:0 0 20px 0;">
                If you did not sign up for this account, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="text-align:center;font-size:12px;color:#999999;margin-top:30px;">
              &copy; {{year}} Banquet Pro. All rights reserved.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
